<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Minecraft World 3D</title>
    <link rel="stylesheet" href="gameplay.css">
</head>
<body>
    <div id="game-root"></div>

    <div id="hud">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <button id="mode-btn" type="button">Mode: SURVIVAL</button>
        <div id="hint">Click to lock mouse. Move: W A S D | Jump: Space</div>
    </div>

    <div id="crosshair" aria-hidden="true">+</div>
    <div id="hand" aria-hidden="true"></div>

    <div id="hud-bottom">
        <div id="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div id="inventory" aria-label="Inventory Bar">
            <div class="inv-slot" id="inv-slot-1"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
        </div>
    </div>

    <script>
        window.groundAt = function groundAt(x, z) {
            if (typeof window.__groundAt === "function") {
                return window.__groundAt(x, z);
            }
            return 0;
        };
    </script>
    <script type="module" src="gameplay.js"></script>
</body>
</html>
