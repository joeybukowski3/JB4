<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Real 3D Minecraft</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Verdana, Arial, sans-serif;
            background: #79c6ff;
            color: #fff;
        }
        #game-root {
            position: fixed;
            inset: 0;
        }
        .top-ui {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9000;
            display: grid;
            gap: 8px;
        }
        .pause-btn {
            width: fit-content;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, #999 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #d9d9d9;
            border-left-color: #d9d9d9;
            padding: 8px 14px;
            font-weight: 700;
        }
        .hint {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9500;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            user-select: none;
        }
        .hud-bottom {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 9999;
            display: grid;
            gap: 10px;
            justify-items: center;
            pointer-events: none;
        }
        .hearts {
            display: flex;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .heart {
            color: #d7263d;
            font-size: 22px;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        }
        .inventory {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.9);
        }
        .slot {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, #8b8b8b 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #cfcfcf;
            border-left-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div id="game-root"></div>

    <div class="top-ui">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <div id="hint" class="hint">Click game to lock mouse. W A S D to walk.</div>
    </div>

    <div id="crosshair" aria-hidden="true">+</div>

    <div class="hud-bottom">
        <div class="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div class="inventory" aria-label="Inventory Bar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
        import { PointerLockControls } from "https://unpkg.com/three@0.162.0/examples/jsm/controls/PointerLockControls.js";

        const root = document.getElementById("game-root");
        const hint = document.getElementById("hint");

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x79c6ff);
        scene.fog = new THREE.Fog(0x79c6ff, 30, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 700);
        camera.position.set(0, 8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        root.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, renderer.domElement);
        scene.add(controls.getObject());

        scene.add(new THREE.AmbientLight(0xffffff, 0.48));
        const sun = new THREE.DirectionalLight(0xfff2c1, 1.05);
        sun.position.set(80, 100, 40);
        sun.castShadow = true;
        scene.add(sun);
        const sunBall = new THREE.Mesh(
            new THREE.SphereGeometry(6, 20, 20),
            new THREE.MeshBasicMaterial({ color: 0xffee88 })
        );
        sunBall.position.set(130, 95, -120);
        scene.add(sunBall);

        function addCloud(x, y, z) {
            const cloud = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const parts = [
                [0, 0, 0, 8],
                [8, 1, 0, 6],
                [-8, 1, 0, 6],
                [0, 2, 5, 5],
                [0, 1, -5, 5],
            ];
            for (let i = 0; i < parts.length; i += 1) {
                const p = parts[i];
                const puff = new THREE.Mesh(new THREE.SphereGeometry(p[3], 14, 14), mat);
                puff.position.set(p[0], p[1], p[2]);
                cloud.add(puff);
            }
            cloud.position.set(x, y, z);
            scene.add(cloud);
        }
        addCloud(20, 70, -80);
        addCloud(-60, 65, -30);
        addCloud(70, 60, 40);

        // 3D grass world made of many cubes.
        const worldSize = 100;
        const half = worldSize / 2;
        const grassGeo = new THREE.BoxGeometry(1, 1, 1);
        const grassMat = new THREE.MeshLambertMaterial({ color: 0x39ff14 });
        const dirtGeo = new THREE.BoxGeometry(1, 1, 1);
        const dirtMat = new THREE.MeshLambertMaterial({ color: 0x7b4b2a });
        const grassCount = worldSize * worldSize;
        const grass = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
        const dirt = new THREE.InstancedMesh(dirtGeo, dirtMat, grassCount);
        grass.castShadow = true;
        grass.receiveShadow = true;
        dirt.castShadow = true;
        dirt.receiveShadow = true;
        scene.add(grass);
        scene.add(dirt);

        const dummy = new THREE.Object3D();
        let idx = 0;
        for (let x = -half; x < half; x += 1) {
            for (let z = -half; z < half; z += 1) {
                dummy.position.set(x + 0.5, 0.5, z + 0.5);
                dummy.updateMatrix();
                grass.setMatrixAt(idx, dummy.matrix);
                dummy.position.set(x + 0.5, -0.5, z + 0.5);
                dummy.updateMatrix();
                dirt.setMatrixAt(idx, dummy.matrix);
                idx += 1;
            }
        }
        grass.instanceMatrix.needsUpdate = true;
        dirt.instanceMatrix.needsUpdate = true;

        // Controls + gravity.
        const key = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        const move = new THREE.Vector3();
        const velocity = new THREE.Vector3(0, 0, 0);
        const clock = new THREE.Clock();

        const eyeHeight = 1.7;
        const walkSpeed = 9;
        const gravity = 24;
        const floorTopY = 1; // cubes centered at y=0.5, height=1

        controls.getObject().position.set(0, 5, 0);

        function onKeyDown(event) {
            if (event.code in key) {
                key[event.code] = true;
                event.preventDefault();
            }
        }
        function onKeyUp(event) {
            if (event.code in key) {
                key[event.code] = false;
            }
        }

        function update(dt) {
            if (!controls.isLocked) return;

            move.set(0, 0, 0);
            if (key.KeyW) move.z -= 1;
            if (key.KeyS) move.z += 1;
            if (key.KeyA) move.x -= 1;
            if (key.KeyD) move.x += 1;

            if (move.lengthSq() > 0) {
                move.normalize();
                controls.moveRight(move.x * walkSpeed * dt);
                controls.moveForward(-move.z * walkSpeed * dt);
            }

            velocity.y -= gravity * dt;
            controls.getObject().position.y += velocity.y * dt;

            const groundedY = floorTopY + eyeHeight;
            if (controls.getObject().position.y <= groundedY) {
                controls.getObject().position.y = groundedY;
                velocity.y = 0;
            }

            const limit = half - 0.5;
            controls.getObject().position.x = Math.max(-limit, Math.min(limit, controls.getObject().position.x));
            controls.getObject().position.z = Math.max(-limit, Math.min(limit, controls.getObject().position.z));
        }

        renderer.domElement.addEventListener("click", () => {
            if (!controls.isLocked) controls.lock();
        });

        controls.addEventListener("lock", () => {
            hint.textContent = "Mouse active. W A S D to walk on grass.";
        });
        controls.addEventListener("unlock", () => {
            hint.textContent = "Click game to lock mouse. W A S D to walk.";
        });

        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            update(dt);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
