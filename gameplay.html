<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Simple Floor Fix</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Verdana, Arial, sans-serif;
            background: #1e2228;
            color: #fff;
        }

        .world {
            position: fixed;
            inset: 0;
        }

        .grass-floor {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 70vh;
            background:
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.08) 0 10px,
                    rgba(0, 0, 0, 0.08) 10px 20px
                ),
                linear-gradient(180deg, #66c343 0%, #2d8b2f 100%);
            border-top: 8px solid #8f5f35;
        }

        .character {
            position: absolute;
            width: 34px;
            height: 34px;
            left: 50%;
            bottom: 70vh;
            transform: translate(-50%, 50%);
            background: linear-gradient(180deg, #51eb69 0%, #2eaf45 100%);
            border: 3px solid #0e5f1f;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.25);
        }

        .top-ui {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9000;
            display: grid;
            gap: 8px;
        }

        .pause-btn {
            width: fit-content;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, #999 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #d9d9d9;
            border-left-color: #d9d9d9;
            padding: 8px 14px;
            font-weight: 700;
        }

        .hint {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .hud-bottom {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 9999;
            display: grid;
            gap: 10px;
            justify-items: center;
            pointer-events: none;
        }

        .hearts {
            display: flex;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .heart {
            color: #d7263d;
            font-size: 22px;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        }

        .inventory {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.9);
        }

        .slot {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, #8b8b8b 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #cfcfcf;
            border-left-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <main class="world">
        <div class="grass-floor" aria-label="Grass Floor"></div>
        <div class="character" aria-label="Player"></div>
    </main>

    <div class="top-ui">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <div class="hint">Simple Floor Mode active.</div>
    </div>

    <div class="hud-bottom">
        <div class="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div class="inventory" aria-label="Inventory Bar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>
</body>
</html>
