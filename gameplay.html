<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Emergency Ground</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Verdana, Arial, sans-serif;
            background: #79c6ff;
            color: #fff;
        }
        #game-root {
            position: fixed;
            inset: 0;
        }
        .top-ui {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9000;
            display: grid;
            gap: 8px;
        }
        .pause-btn {
            width: fit-content;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, #999 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #d9d9d9;
            border-left-color: #d9d9d9;
            padding: 8px 14px;
            font-weight: 700;
        }
        .hint {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9500;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            user-select: none;
        }
        .hud-bottom {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 9999;
            display: grid;
            gap: 10px;
            justify-items: center;
            pointer-events: none;
        }
        .hearts {
            display: flex;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .heart {
            color: #d7263d;
            font-size: 22px;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        }
        .inventory {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.9);
        }
        .slot {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, #8b8b8b 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #cfcfcf;
            border-left-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div id="game-root"></div>

    <div class="top-ui">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <div id="hint" class="hint">Click game to lock mouse. W A S D to move.</div>
    </div>

    <div id="crosshair" aria-hidden="true">+</div>

    <div class="hud-bottom">
        <div class="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div class="inventory" aria-label="Inventory Bar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
        import { PointerLockControls } from "https://unpkg.com/three@0.162.0/examples/jsm/controls/PointerLockControls.js";

        const root = document.getElementById("game-root");
        const hint = document.getElementById("hint");

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x79c6ff);
        scene.fog = new THREE.Fog(0x79c6ff, 30, 220);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 5, 0);
        camera.rotation.x = -0.18;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        root.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, renderer.domElement);
        scene.add(controls.getObject());

        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        const sun = new THREE.DirectionalLight(0xfff0c2, 0.95);
        sun.position.set(40, 50, 10);
        sun.castShadow = true;
        scene.add(sun);

        const worldSize = 100;
        const half = worldSize / 2;

        // Permanent unbreakable bedrock floor.
        const bedrock = new THREE.Mesh(
            new THREE.BoxGeometry(worldSize, 2, worldSize),
            new THREE.MeshLambertMaterial({ color: 0x2f2f2f })
        );
        bedrock.position.set(0, 0, 0);
        bedrock.receiveShadow = true;
        bedrock.castShadow = true;
        scene.add(bedrock);

        // Mineable 3D grass blocks on top of bedrock.
        const grassGeometry = new THREE.BoxGeometry(1, 1, 1);
        const grassMaterial = new THREE.MeshLambertMaterial({ color: 0x39ff14 });
        const grassCount = worldSize * worldSize;
        const grassMesh = new THREE.InstancedMesh(grassGeometry, grassMaterial, grassCount);
        grassMesh.castShadow = true;
        grassMesh.receiveShadow = true;
        scene.add(grassMesh);

        const dummy = new THREE.Object3D();
        const grassAlive = new Array(grassCount).fill(true);

        function indexFromCell(cx, cz) {
            return (cx + half) * worldSize + (cz + half);
        }

        function cellFromPosition(x, z) {
            const cx = Math.max(-half, Math.min(half - 1, Math.floor(x)));
            const cz = Math.max(-half, Math.min(half - 1, Math.floor(z)));
            return { cx, cz };
        }

        for (let x = -half; x < half; x += 1) {
            for (let z = -half; z < half; z += 1) {
                const idx = indexFromCell(x, z);
                dummy.position.set(x + 0.5, 1.5, z + 0.5);
                dummy.updateMatrix();
                grassMesh.setMatrixAt(idx, dummy.matrix);
            }
        }
        grassMesh.instanceMatrix.needsUpdate = true;

        const key = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        const move = new THREE.Vector3();
        const vel = new THREE.Vector3(0, 0, 0);
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();

        const playerEyeHeight = 1.7;
        const gravity = 22;
        const walkSpeed = 8;
        const bedrockTop = bedrock.position.y + 1; // top surface y

        controls.getObject().position.set(0, 5, 0);

        function surfaceYAt(x, z) {
            const { cx, cz } = cellFromPosition(x, z);
            const idx = indexFromCell(cx, cz);
            if (grassAlive[idx]) {
                return 2; // top of grass block (y center 1.5, height 1)
            }
            return bedrockTop; // bedrock always exists
        }

        function mineAtCrosshair() {
            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            const hits = raycaster.intersectObject(grassMesh, false);
            if (!hits.length) {
                return;
            }
            const hit = hits[0];
            if (typeof hit.instanceId !== "number") {
                return;
            }
            const id = hit.instanceId;
            if (!grassAlive[id]) {
                return;
            }
            grassAlive[id] = false;
            // Move mined grass far below the world so it is effectively removed.
            dummy.position.set(0, -9999, 0);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(id, dummy.matrix);
            grassMesh.instanceMatrix.needsUpdate = true;
            hint.textContent = "Mined GRASS. Bedrock floor stays forever.";
        }

        function onKeyDown(e) {
            if (e.code in key) {
                key[e.code] = true;
                e.preventDefault();
            }
        }

        function onKeyUp(e) {
            if (e.code in key) {
                key[e.code] = false;
            }
        }

        function update(dt) {
            if (!controls.isLocked) return;

            move.set(0, 0, 0);
            if (key.KeyW) move.z -= 1;
            if (key.KeyS) move.z += 1;
            if (key.KeyA) move.x -= 1;
            if (key.KeyD) move.x += 1;

            if (move.lengthSq() > 0) {
                move.normalize();
                controls.moveRight(move.x * walkSpeed * dt);
                controls.moveForward(-move.z * walkSpeed * dt);
            }

            vel.y -= gravity * dt;
            controls.getObject().position.y += vel.y * dt;

            const floorTop = surfaceYAt(controls.getObject().position.x, controls.getObject().position.z);
            const groundedY = floorTop + playerEyeHeight;
            if (controls.getObject().position.y <= groundedY) {
                controls.getObject().position.y = groundedY;
                vel.y = 0;
            }

            const limit = half - 0.5;
            controls.getObject().position.x = Math.max(-limit, Math.min(limit, controls.getObject().position.x));
            controls.getObject().position.z = Math.max(-limit, Math.min(limit, controls.getObject().position.z));
        }

        renderer.domElement.addEventListener("click", () => {
            if (!controls.isLocked) {
                controls.lock();
                return;
            }
            mineAtCrosshair();
        });

        controls.addEventListener("lock", () => {
            hint.textContent = "Mouse locked. W A S D to move, click to mine grass.";
        });
        controls.addEventListener("unlock", () => {
            hint.textContent = "Click game to lock mouse. W A S D to move.";
        });

        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            update(dt);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
