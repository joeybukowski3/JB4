<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Minecraft World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gameplay.css">
</head>
<body>
    <div class="game-screen">
        <header class="game-top">
            <a class="pause-btn" href="index.html">Pause</a>
        </header>

        <main class="game-main">
            <section class="crafting" aria-label="Crafting Area">
                <h1>Crafting</h1>
                <div class="craft-grid">
                    <button type="button">Wood</button>
                    <button type="button">Stone</button>
                    <button type="button">Iron</button>
                    <button type="button">Coal</button>
                    <button type="button">Sand</button>
                    <button type="button">Glass</button>
                    <button type="button">Wool</button>
                    <button type="button">Gold</button>
                    <button type="button">Diamond</button>
                </div>
            </section>
        </main>

        <footer class="hud">
            <div class="health-bar" aria-label="Health Bar">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
            <div class="inventory-bar" aria-label="Inventory Bar">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
        </footer>
    </div>
</body>
</html>
