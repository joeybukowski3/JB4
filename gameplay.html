<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay - Ultimate Floor</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Verdana, Arial, sans-serif;
            background: #79c6ff;
            color: #fff;
        }
        #game-root {
            position: fixed;
            inset: 0;
        }
        #fallback-floor {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 65vh;
            z-index: 1;
            background:
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.08) 0 10px,
                    rgba(0, 0, 0, 0.08) 10px 20px
                ),
                linear-gradient(180deg, #5ff03a 0%, #2ea327 100%);
            border-top: 6px solid #6f4b2a;
            pointer-events: none;
        }
        .top-ui {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9000;
            display: grid;
            gap: 8px;
        }
        .pause-btn {
            width: fit-content;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, #999 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #d9d9d9;
            border-left-color: #d9d9d9;
            padding: 8px 14px;
            font-weight: 700;
        }
        .hint {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9500;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            user-select: none;
        }
        .hud-bottom {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 9999;
            display: grid;
            gap: 10px;
            justify-items: center;
            pointer-events: none;
        }
        .hearts {
            display: flex;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .heart {
            color: #d7263d;
            font-size: 22px;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        }
        .inventory {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.9);
        }
        .slot {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, #8b8b8b 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #cfcfcf;
            border-left-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div id="game-root"></div>
    <div id="fallback-floor" aria-hidden="true"></div>

    <div class="top-ui">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <div id="hint" class="hint">Click game to lock mouse. W A S D to move.</div>
    </div>

    <div id="crosshair" aria-hidden="true">+</div>

    <div class="hud-bottom">
        <div class="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div class="inventory" aria-label="Inventory Bar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
        import { PointerLockControls } from "https://unpkg.com/three@0.162.0/examples/jsm/controls/PointerLockControls.js";

        const root = document.getElementById("game-root");
        const hint = document.getElementById("hint");

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x79c6ff);
        scene.fog = new THREE.Fog(0x79c6ff, 30, 260);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 600);
        camera.position.set(0, 5, 0);
        camera.rotation.x = -0.2;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        root.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, renderer.domElement);
        scene.add(controls.getObject());
        camera.lookAt(0, 0, 35);

        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        const sun = new THREE.DirectionalLight(0xfff2c1, 1.0);
        sun.position.set(60, 70, 20);
        sun.castShadow = true;
        scene.add(sun);

        // FORCE THE FLOOR: giant 200x200 bright green rectangle at y = 0.
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(200, 2, 200),
            new THREE.MeshLambertMaterial({ color: 0x39ff14 })
        );
        floor.position.set(0, 0, 0);
        floor.castShadow = true;
        floor.receiveShadow = true;
        scene.add(floor);

        const key = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        const move = new THREE.Vector3();
        const velocity = new THREE.Vector3(0, 0, 0);
        const clock = new THREE.Clock();

        const eyeHeight = 1.7;
        const walkSpeed = 9;
        const gravity = 22;
        const floorTop = 1; // floor center y=0, half-height=1
        const groundedY = floorTop + eyeHeight;

        // STOP THE FALLING: gravity disabled until standing on the floor.
        let gravityEnabled = false;
        controls.getObject().position.set(0, 5, 0);
        const fallbackFloor = document.getElementById("fallback-floor");
        fallbackFloor.style.display = "none";

        function onKeyDown(event) {
            if (event.code in key) {
                key[event.code] = true;
                event.preventDefault();
            }
        }

        function onKeyUp(event) {
            if (event.code in key) {
                key[event.code] = false;
            }
        }

        function update(dt) {
            if (!controls.isLocked) {
                return;
            }

            move.set(0, 0, 0);
            if (key.KeyW) move.z -= 1;
            if (key.KeyS) move.z += 1;
            if (key.KeyA) move.x -= 1;
            if (key.KeyD) move.x += 1;

            if (move.lengthSq() > 0) {
                move.normalize();
                controls.moveRight(move.x * walkSpeed * dt);
                controls.moveForward(-move.z * walkSpeed * dt);
            }

            const player = controls.getObject().position;
            if (player.y <= groundedY) {
                player.y = groundedY;
                velocity.y = 0;
                gravityEnabled = false;
            } else if (gravityEnabled) {
                velocity.y -= gravity * dt;
                player.y += velocity.y * dt;
            } else {
                // Wait until grounded once, without introducing falling jitter.
                player.y = Math.max(player.y, groundedY);
            }

            // Keep player above floor footprint.
            const limit = 99;
            player.x = Math.max(-limit, Math.min(limit, player.x));
            player.z = Math.max(-limit, Math.min(limit, player.z));
        }

        renderer.domElement.addEventListener("click", () => {
            if (!controls.isLocked) {
                controls.lock();
                return;
            }
            hint.textContent = "Mouse locked. Floor is solid.";
        });

        controls.addEventListener("lock", () => {
            const player = controls.getObject().position;
            if (player.y > groundedY) {
                gravityEnabled = true;
            }
            hint.textContent = "Mouse locked. W A S D to walk, floor collision active.";
        });

        controls.addEventListener("unlock", () => {
            hint.textContent = "Click game to lock mouse. W A S D to move.";
        });

        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            update(dt);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
