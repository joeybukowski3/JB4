<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay Emergency Reset</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Verdana, Arial, sans-serif;
            background: #7ec6ff;
            color: #fff;
        }
        #game-root {
            position: fixed;
            inset: 0;
        }
        #hud-top {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 2000;
            display: grid;
            gap: 8px;
        }
        .pause-btn {
            width: fit-content;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, #999 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #d9d9d9;
            border-left-color: #d9d9d9;
            padding: 8px 14px;
            font-weight: 700;
        }
        #hint {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.45);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2200;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            user-select: none;
        }
        #hud-bottom {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 3000;
            display: grid;
            gap: 10px;
            justify-items: center;
            pointer-events: none;
        }
        #hearts {
            display: flex;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .heart {
            color: #d7263d;
            font-size: 22px;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        }
        #inventory {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(0, 0, 0, 0.8);
        }
        .inv-slot {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, #8b8b8b 0%, #666 100%);
            border: 3px solid #1f1f1f;
            border-top-color: #cfcfcf;
            border-left-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div id="game-root"></div>

    <div id="hud-top">
        <a class="pause-btn" href="index.html">PAUSE</a>
        <div id="hint">Click to lock mouse. Move with W A S D.</div>
    </div>

    <div id="crosshair" aria-hidden="true">+</div>

    <div id="hud-bottom">
        <div id="hearts" aria-label="Health Bar">
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
            <span class="heart">&#10084;</span>
        </div>
        <div id="inventory" aria-label="Inventory Bar">
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
        import { PointerLockControls } from "https://unpkg.com/three@0.162.0/examples/jsm/controls/PointerLockControls.js";

        const root = document.getElementById("game-root");
        const hint = document.getElementById("hint");

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec6ff);
        scene.fog = new THREE.Fog(0x7ec6ff, 60, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 600);
        camera.position.set(0, 7, 20);
        camera.rotation.x = -0.3;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        root.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, renderer.domElement);
        scene.add(controls.getObject());

        const ambient = new THREE.AmbientLight(0xffffff, 0.45);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xfff3bf, 1.0);
        sun.position.set(30, 45, 20);
        sun.castShadow = true;
        scene.add(sun);

        const sunBall = new THREE.Mesh(
            new THREE.SphereGeometry(3, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe888 })
        );
        sunBall.position.copy(sun.position);
        scene.add(sunBall);

        function makeTopGrassTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#5fb43a";
            ctx.fillRect(0, 0, 32, 32);
            for (let i = 0; i < 220; i += 1) {
                const x = Math.floor(Math.random() * 32);
                const y = Math.floor(Math.random() * 32);
                ctx.fillStyle = `rgb(${30 + Math.floor(Math.random() * 30)}, ${120 + Math.floor(Math.random() * 100)}, ${25 + Math.floor(Math.random() * 30)})`;
                ctx.fillRect(x, y, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        function makeDirtTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#7b4b2a";
            ctx.fillRect(0, 0, 32, 32);
            for (let i = 0; i < 180; i += 1) {
                const x = Math.floor(Math.random() * 32);
                const y = Math.floor(Math.random() * 32);
                const s = 80 + Math.floor(Math.random() * 60);
                ctx.fillStyle = `rgb(${s + 35}, ${s}, ${s - 20})`;
                ctx.fillRect(x, y, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const grassTop = makeTopGrassTexture();
        const dirtSide = makeDirtTexture();
        const grassBlockMats = [
            new THREE.MeshLambertMaterial({ map: dirtSide }),
            new THREE.MeshLambertMaterial({ map: dirtSide }),
            new THREE.MeshLambertMaterial({ map: grassTop }),
            new THREE.MeshLambertMaterial({ map: dirtSide }),
            new THREE.MeshLambertMaterial({ map: dirtSide }),
            new THREE.MeshLambertMaterial({ map: dirtSide }),
        ];

        const floorSize = 100;
        const floorBlockGeo = new THREE.BoxGeometry(1, 1, 1);
        const dummy = new THREE.Object3D();
        const floorBlocks = new THREE.InstancedMesh(floorBlockGeo, grassBlockMats, floorSize * floorSize);
        floorBlocks.castShadow = true;
        floorBlocks.receiveShadow = true;

        let idx = 0;
        for (let x = 0; x < floorSize; x += 1) {
            for (let z = 0; z < floorSize; z += 1) {
                dummy.position.set(x + 0.5, 0.5, z + 0.5);
                dummy.updateMatrix();
                floorBlocks.setMatrixAt(idx, dummy.matrix);
                idx += 1;
            }
        }
        scene.add(floorBlocks);

        const keyState = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        const moveDir = new THREE.Vector3();
        const clock = new THREE.Clock();

        function onKeyDown(e) {
            if (e.code in keyState) {
                keyState[e.code] = true;
                e.preventDefault();
            }
        }

        function onKeyUp(e) {
            if (e.code in keyState) {
                keyState[e.code] = false;
            }
        }

        function updateMovement(dt) {
            if (!controls.isLocked) return;
            moveDir.set(0, 0, 0);
            if (keyState.KeyW) moveDir.z -= 1;
            if (keyState.KeyS) moveDir.z += 1;
            if (keyState.KeyA) moveDir.x -= 1;
            if (keyState.KeyD) moveDir.x += 1;
            if (moveDir.lengthSq() > 0) {
                moveDir.normalize();
                controls.moveRight(moveDir.x * 9 * dt);
                controls.moveForward(-moveDir.z * 9 * dt);
            }
            controls.getObject().position.x = Math.max(0.5, Math.min(99.5, controls.getObject().position.x));
            controls.getObject().position.z = Math.max(0.5, Math.min(99.5, controls.getObject().position.z));
            controls.getObject().position.y = 2;
        }

        renderer.domElement.addEventListener("click", () => {
            if (!controls.isLocked) controls.lock();
        });

        controls.addEventListener("lock", () => {
            hint.textContent = "Mouse locked. Move with W A S D.";
        });
        controls.addEventListener("unlock", () => {
            hint.textContent = "Click to lock mouse. Move with W A S D.";
        });

        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            updateMovement(dt);
            renderer.render(scene, camera);
        }

        controls.getObject().position.set(0, 2, 0);
        animate();
    </script>
</body>
</html>
